<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <img id="profile-pic" alt="Your profile picture" class="profile-pic">
            <h1 id="profile-name"></h1>
            <p id="profile-title"></p>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#resume">Resume</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="about">
            <div class="container">
                <h2>About Me</h2>
                <p id="about-text"></p>
            </div>
        </section>

        <section id="projects">
            <div class="container">
                <h2>Projects</h2>
                <div id="projects-list">
                    <!-- Projects will be dynamically added here -->
                </div>
            </div>
        </section>

        <section id="resume">
            <div class="container">
                <h2>Resume</h2>
                <p><a href="resume.pdf" target="_blank" class="btn">Download My Resume</a></p>
            </div>
        </section>

        <section id="contact">
            <div class="container">
                <h2>Contact</h2>
                <p>Email: <a href="mailto:youremail@example.com">youremail@example.com</a></p>
                <p>LinkedIn: <a href="https://linkedin.com/in/yourusername" target="_blank">linkedin.com/in/yourusername</a></p>
                <p>GitHub: <a href="https://github.com/yourusername" target="_blank">github.com/yourusername</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Your Name. All rights reserved.</p>
    </footer>

    <script src="scripts.js" defer></script>
</body>
</html>
